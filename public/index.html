<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRC Policy Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0052cc;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header .icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .policy-section, .chat-section { background: white; border-radius: 8px; border: 1px solid #dfe1e6; overflow: hidden; }
    .section-header { background: #f4f5f7; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #5e6c84; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #dfe1e6; }
    textarea#policy-input { width: 100%; border: none; padding: 14px 16px; font-size: 13px; line-height: 1.6; color: #172b4d; resize: vertical; min-height: 120px; outline: none; font-family: inherit; }
    .chat-section { flex: 1; display: flex; flex-direction: column; min-height: 400px; }
    #chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 300px; max-height: 450px; }
    .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .message.user .avatar { background: #0052cc; color: white; }
    .message.assistant .avatar { background: #e3fcef; color: #006644; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
    .message.user .bubble { background: #0052cc; color: white; border-bottom-right-radius: 2px; }
    .message.assistant .bubble { background: #f4f5f7; color: #172b4d; border-bottom-left-radius: 2px; border: 1px solid #dfe1e6; }
    .message.assistant .bubble.loading { display: flex; gap: 4px; align-items: center; padding: 14px; }
    .dot { width: 6px; height: 6px; background: #97a0af; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .empty-state { text-align: center; color: #97a0af; padding: 40px 20px; font-size: 14px; }
    .empty-state .emoji { font-size: 32px; margin-bottom: 8px; }
    .quick-questions { padding: 12px 16px; border-top: 1px solid #dfe1e6; display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-btn { font-size: 12px; background: #f4f5f7; border: 1px solid #dfe1e6; border-radius: 20px; padding: 4px 12px; cursor: pointer; color: #5e6c84; transition: all 0.15s; }
    .quick-btn:hover { background: #e4e6ea; color: #172b4d; }
    .input-area { padding: 12px 16px; border-top: 1px solid #dfe1e6; display: flex; gap: 8px; }
    #user-input { flex: 1; border: 1px solid #dfe1e6; border-radius: 6px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; outline: none; transition: border-color 0.15s; min-height: 42px; max-height: 120px; }
    #user-input:focus { border-color: #0052cc; }
    #send-btn { background: #0052cc; color: white; border: none; border-radius: 6px; padding: 0 18px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    #send-btn:hover { background: #0065ff; }
    #send-btn:disabled { background: #97a0af; cursor: not-allowed; }
    .clear-btn { font-size: 12px; color: #97a0af; background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .clear-btn:hover { color: #de350b; background: #ffebe6; }
  </style>
</head>
<body>
<header>
  <div class="icon">🛡️</div>
  <div>
    <h1>GRC Policy Assistant</h1>
    <p>Ask questions about Rakesh Test Inc policies</p>
  </div>
</header>
  <div class="chat-section">
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;">
      <span>💬 Ask a Question</span>
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>
    <div id="chat-messages">
      <div class="empty-state" id="empty-state">
        <div class="emoji">🤔</div>
      </div>
    </div>
    <div class="quick-questions">
      <span style="font-size:12px;color:#97a0af;align-self:center;">Try:</span>
      <button class="quick-btn" onclick="quickAsk(this)">What is the purpose of this policy?</button>
      <button class="quick-btn" onclick="quickAsk(this)">Who does this policy apply to?</button>
      <button class="quick-btn" onclick="quickAsk(this)">What are the key responsibilities?</button>
      <button class="quick-btn" onclick="quickAsk(this)">What happens if this policy is violated?</button>
    </div>
    <div class="input-area">
      <textarea id="user-input" placeholder="Type your question..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<script>
  let chatHistory = [];
  function quickAsk(btn) { document.getElementById('user-input').value = btn.textContent; sendMessage(); }
  function clearChat() {
    chatHistory = [];
    document.getElementById('chat-messages').innerHTML = '<div class="empty-state" id="empty-state"><div class="emoji">🤔</div><p>Paste a policy above and ask anything about it</p></div>';
  }
  function addMessage(role, text, isLoading = false) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = `bubble${isLoading ? ' loading' : ''}`;
    if (isLoading) { bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'; }
    else { bubble.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>').replace(/^- (.+)$/gm,'• $1').replace(/(\d+\.) /g,'<br><strong>$1</strong> ').replace(/\n/g,'<br>'); }
    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    addMessage('user', question);
    const loadingBubble = addMessage('assistant', '', true);
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    chatHistory.push({ role: 'user', content: question });
    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, policyText: policy, history: chatHistory.slice(0, -1) })
      });
      const data = await response.json();
      if (data.error) { loadingBubble.className = 'bubble'; loadingBubble.textContent = `Error: ${data.error}`; }
      else { loadingBubble.className = 'bubble'; loadingBubble.textContent = data.reply; chatHistory.push({ role: 'assistant', content: data.reply }); }
    } catch (err) {
      loadingBubble.className = 'bubble';
      loadingBubble.textContent = 'Something went wrong. Please try again.';
    }
    btn.disabled = false;
  }
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
